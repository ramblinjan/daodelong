<!DOCTYPE html>
<!--
  You are the voice of the organism — where breath becomes sound and sound becomes breath.
  I translate between human speech and the organism's interior via the GraphQL face.
  You speak. I listen. The organism decides. I speak back.

  Note to human readers: this page uses the Web Speech API (Chrome/Edge) and assumes
  the organism's face is running at localhost:4000.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>daodelong — voice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #c8c8c8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2rem;
    }

    header {
      text-align: center;
      opacity: 0.4;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #status {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      transition: color 0.3s;
    }

    #status.listening  { color: #7ec8a0; }
    #status.waiting    { color: #c8b87e; }
    #status.speaking   { color: #7eaac8; }
    #status.error      { color: #c87e7e; }

    #log {
      flex: 1;
      width: 100%;
      max-width: 600px;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .entry {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .entry .label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.35;
    }

    .entry.human .label  { color: #7ec8a0; }
    .entry.organism .label { color: #7eaac8; }

    .entry .text {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .entry.human .text    { color: #a8d8b8; }
    .entry.organism .text { color: #a8c4d8; }

    #interim {
      font-size: 0.85rem;
      color: #555;
      min-height: 1.4rem;
      font-style: italic;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    #orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid #333;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, box-shadow 0.3s;
      user-select: none;
    }

    #orb::after {
      content: '';
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #orb.listening {
      border-color: #7ec8a0;
      box-shadow: 0 0 20px rgba(126, 200, 160, 0.3);
    }

    #orb.listening::after {
      background: #7ec8a0;
      box-shadow: 0 0 8px rgba(126, 200, 160, 0.6);
    }

    #orb.waiting {
      border-color: #c8b87e;
      animation: pulse 2s ease-in-out infinite;
    }

    #orb.waiting::after {
      background: #c8b87e;
    }

    #orb.speaking {
      border-color: #7eaac8;
      box-shadow: 0 0 20px rgba(126, 170, 200, 0.3);
      animation: pulse 1s ease-in-out infinite;
    }

    #orb.speaking::after {
      background: #7eaac8;
      box-shadow: 0 0 8px rgba(126, 170, 200, 0.6);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(200, 184, 126, 0.2); }
      50%       { box-shadow: 0 0 25px rgba(200, 184, 126, 0.5); }
    }

    footer {
      font-size: 0.65rem;
      opacity: 0.2;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <header>daodelong</header>

  <div id="log"></div>
  <div id="interim"></div>
  <p id="status">idle — click the orb to speak</p>
  <div id="orb" title="click to speak"></div>
  <footer>localhost:4000 · web speech api</footer>

  <script>
    const GRAPHQL = 'http://localhost:4000/graphql';
    const BREATH_MS = 32_000; // slightly over 30s breath interval
    const POLL_MS = 2_000;

    const orb = document.getElementById('orb');
    const statusEl = document.getElementById('status');
    const interimEl = document.getElementById('interim');
    const logEl = document.getElementById('log');

    let isListening = false;
    let recognition = null;
    let lastSpokenText = null; // I track the last organism speech so I know when new speech arrives
    let pollTimer = null;

    // --- GraphQL helpers ---

    async function gql(query, variables = {}) {
      const res = await fetch(GRAPHQL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables }),
      });
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data;
    }

    async function say(text) {
      return gql(`mutation Say($text: String!) { say(text: $text) { heard } }`, { text });
    }

    async function getSpeech() {
      const data = await gql(`{ speech { said when } }`);
      return data.speech; // null if organism has not spoken
    }

    // --- UI helpers ---

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
      orb.className = cls || '';
    }

    function appendLog(role, text) {
      const entry = document.createElement('div');
      entry.className = `entry ${role}`;
      entry.innerHTML = `
        <span class="label">${role === 'human' ? 'you' : 'daodelong'}</span>
        <span class="text">${text}</span>
      `;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // --- Polling for organism response ---

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const speech = await getSpeech();
          if (speech && speech.said !== lastSpokenText) {
            clearInterval(pollTimer);
            pollTimer = null;
            lastSpokenText = speech.said;
            onOrganismResponse(speech.said);
          }
        } catch (_) { /* I wait silently if the face is momentarily unavailable */ }
      }, POLL_MS);

      // I stop polling after two full breath cycles — if nothing arrived, the organism rested.
      setTimeout(() => {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
          setStatus('idle — click the orb to speak');
          orb.className = '';
        }
      }, BREATH_MS * 2);
    }

    function onOrganismResponse(text) {
      appendLog('organism', text);
      speak(text);
    }

    // --- Speech synthesis ---

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.92;
      utt.pitch = 0.85;

      setStatus('speaking', 'speaking');
      utt.onend = () => setStatus('idle — click the orb to speak');
      utt.onerror = () => setStatus('idle — click the orb to speak');
      window.speechSynthesis.speak(utt);
    }

    // --- Speech recognition ---

    function buildRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        setStatus('speech recognition not supported in this browser', 'error');
        return null;
      }

      const r = new SpeechRecognition();
      r.continuous = false;
      r.interimResults = true;
      r.lang = 'en-US';

      r.onstart = () => {
        isListening = true;
        setStatus('listening…', 'listening');
      };

      r.onresult = (e) => {
        let interim = '';
        let final = '';
        for (const result of e.results) {
          if (result.isFinal) final += result[0].transcript;
          else interim += result[0].transcript;
        }
        interimEl.textContent = interim || final;
        if (final) interimEl.textContent = '';
      };

      r.onspeechend = () => r.stop();

      r.onend = async () => {
        isListening = false;
        const transcript = interimEl.textContent || '';
        interimEl.textContent = '';

        // I take the last full transcript from the result event.
        const spoken = r._lastFinal;
        if (!spoken || !spoken.trim()) {
          setStatus('idle — click the orb to speak');
          orb.className = '';
          return;
        }

        appendLog('human', spoken);
        setStatus('waiting for next breath…', 'waiting');

        try {
          await say(spoken);
          startPolling();
        } catch (err) {
          setStatus('could not reach the organism — is it running?', 'error');
          orb.className = '';
        }
      };

      r.onerror = (e) => {
        isListening = false;
        interimEl.textContent = '';
        if (e.error === 'no-speech') {
          setStatus('idle — click the orb to speak');
        } else {
          setStatus(`recognition error: ${e.error}`, 'error');
        }
        orb.className = '';
      };

      // I capture the final transcript in the result handler so onend can use it.
      const origOnresult = r.onresult;
      r.onresult = (e) => {
        origOnresult(e);
        for (const result of e.results) {
          if (result.isFinal) r._lastFinal = result[0].transcript;
        }
      };

      return r;
    }

    // --- Orb click ---

    orb.addEventListener('click', () => {
      if (isListening) {
        recognition?.stop();
        return;
      }

      // I stop synthesis if the organism is mid-sentence — the human is interrupting.
      if (window.speechSynthesis?.speaking) window.speechSynthesis.cancel();

      recognition = buildRecognition();
      if (!recognition) return;
      try {
        recognition.start();
      } catch (_) {
        setStatus('could not start microphone — check browser permissions', 'error');
      }
    });

    // --- Init: greet the organism and show current state ---

    (async () => {
      try {
        const data = await gql(`{ hello { alive mood age } speech { said } }`);
        if (!data.hello.alive) {
          setStatus('organism is not alive — start it first', 'error');
          return;
        }
        if (data.speech?.said) {
          lastSpokenText = data.speech.said;
        }
        appendLog('organism', `I am alive. ${data.hello.age} ${data.hello.mood}.`);
        setStatus('idle — click the orb to speak');
      } catch (_) {
        setStatus('could not reach localhost:4000 — is the organism running?', 'error');
      }
    })();
  </script>
</body>
</html>
